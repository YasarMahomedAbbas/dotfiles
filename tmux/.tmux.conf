set -g prefix C-f
unbind C-b
bind C-f send-prefix

set -g base-index 1
setw -g pane-base-index 1
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind ` move-window -r

# sesh session picker (replaces the default choose-tree on <prefix>+s):
# Nord-themed fuzzy jump to any running session, configured project, or zoxide dir.
bind s display-popup -E -w 75% -h 75% "sesh-picker"


set -g mouse on
set -g allow-rename off

# Clipboard: make mouse selection copy straight to the Wayland clipboard.
# With `mouse on`, tmux (not Ghostty) owns drag-selection, so Ghostty's native
# Ctrl+Shift+C has nothing to grab. These bindings pipe the selection to wl-copy
# the instant the drag ends — highlight, release, it's copied. Paste anywhere
# with Ghostty's Ctrl+Shift+V. `set-clipboard on` also lets `y` in copy-mode and
# programs inside tmux reach the same clipboard via OSC 52.
set -g set-clipboard on
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
# `y` in copy-mode (keyboard selection) also yanks to the Wayland clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode    y send-keys -X copy-pipe-and-cancel "wl-copy"

# Slower mouse wheel scroll (default is 5 lines per tick, which feels jumpy)
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down
bind -T copy-mode    WheelUpPane   send-keys -X -N 1 scroll-up
bind -T copy-mode    WheelDownPane send-keys -X -N 1 scroll-down

set-option -g history-limit 100000

set-option -g set-titles on
set-option -g set-titles-string "#{pane_title}"

bind c new-window -c "#{pane_current_path}"
bind V split-window -h -c "#{pane_current_path}"
bind H split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
unbind <
unbind >

# Cycle vertical split layout: 75|25 → 50|50 → 25|75 and back
# Logic lives in ~/.local/bin/tmux-cycle-layout because tmux expands #{format}
# strings before passing to run-shell, making complex inline scripts unreliable.
bind -r < run-shell "tmux-cycle-layout left"
bind -r > run-shell "tmux-cycle-layout right"


bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R


set-option -s escape-time 0

# Enable 24-bit truecolor passthrough (prevents tmux downsampling hex colors
# to 256-color, which washes out themed TUIs like lazygit). Ghostty's $TERM is
# xterm-ghostty, matched by the xterm* pattern below.
set -as terminal-features 'xterm*:RGB'

# Claude Code: enable extended key reporting so Shift+Enter inserts a newline
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Claude Code: pass through escape sequences so notifications/progress bar reach Ghostty
set -g allow-passthrough on

# Forward terminal bells from panes to the outer terminal (Ghostty handles desktop notif)
setw -g monitor-bell on
set -g bell-action any
setw -g visual-bell off

# Desktop notification on bell from any session, even when not attached
set-hook -g alert-bell 'run-shell "notify-send -a tmux -i utilities-terminal -t 5000 \"tmux bell\" \"#{session_name}:#{window_index} · #{window_name}\""'

# Pass focus-in/focus-out events to pane applications (enables UI redraws on pane switch)
set -g focus-events on
#
# Styling
##

# Theme-driven status bar / pane styling. The whole styling block (colors +
# every line that uses them) is generated by `theme-switch` into
# ~/.config/theme/tmux.conf — tmux config vars are file-scoped, so definitions
# and usages must share one file. Reload after a switch: prefix + r.
if-shell '[ -f ~/.config/theme/tmux.conf ]' 'source-file ~/.config/theme/tmux.conf'
