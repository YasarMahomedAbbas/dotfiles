set -g prefix C-f
unbind C-b
bind C-f send-prefix

set -g base-index 1
setw -g pane-base-index 1
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind ` move-window -r

# sesh session picker (replaces the default choose-tree on <prefix>+s):
# Nord-themed fuzzy jump to any running session, configured project, or zoxide dir.
bind s display-popup -E -w 75% -h 75% "sesh-picker"


set -g mouse on
set -g allow-rename off

# Slower mouse wheel scroll (default is 5 lines per tick, which feels jumpy)
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down
bind -T copy-mode    WheelUpPane   send-keys -X -N 1 scroll-up
bind -T copy-mode    WheelDownPane send-keys -X -N 1 scroll-down

set-option -g history-limit 100000

set-option -g set-titles on
set-option -g set-titles-string "#{pane_title}"

bind c new-window -c "#{pane_current_path}"
bind V split-window -h -c "#{pane_current_path}"
bind H split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
unbind <
unbind >

# Cycle vertical split layout: 75|25 → 50|50 → 25|75 and back
# Logic lives in ~/.local/bin/tmux-cycle-layout because tmux expands #{format}
# strings before passing to run-shell, making complex inline scripts unreliable.
bind -r < run-shell "tmux-cycle-layout left"
bind -r > run-shell "tmux-cycle-layout right"


bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R


set-option -s escape-time 0

# Enable 24-bit truecolor passthrough (prevents tmux downsampling hex colors
# to 256-color, which washes out themed TUIs like lazygit). Ghostty's $TERM is
# xterm-ghostty, matched by the xterm* pattern below.
set -as terminal-features 'xterm*:RGB'

# Claude Code: enable extended key reporting so Shift+Enter inserts a newline
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Claude Code: pass through escape sequences so notifications/progress bar reach Ghostty
set -g allow-passthrough on

# Forward terminal bells from panes to the outer terminal (Ghostty handles desktop notif)
setw -g monitor-bell on
set -g bell-action any
setw -g visual-bell off

# Desktop notification on bell from any session, even when not attached
set-hook -g alert-bell 'run-shell "notify-send -a tmux -i utilities-terminal -t 5000 \"tmux bell\" \"#{session_name}:#{window_index} · #{window_name}\""'

# Pass focus-in/focus-out events to pane applications (enables UI redraws on pane switch)
set -g focus-events on
#
# Styling
##

# Nord colorscheme
RED="#bf616a"
GREEN="#a3be8c"
YELLOW="#ebcb8b"
BLUE="#81a1c1"
MAGENTA="#b48ead"
CYAN="#88c0d0"
BLACK="#2e3440"
DARK_GRAY="#3b4252"
LIGHT_GRAY="#434c5e"
MUTED="#4c566a"
BG="#2e3440"
FG="#d8dee9"

# Nerdfont characters - powerline caps + status icons
HALF_ROUND_OPEN="#(printf '\uE0B6')"
HALF_ROUND_CLOSE="#(printf '\uE0B4')"
TRIANGLE_OPEN="#(printf '\uE0B2')"
TRIANGLE_CLOSE="#(printf '\uE0B0')"
ICON_SESSION="#(printf '\uF120')"
ICON_HOST="#(printf '\uF108')"
ICON_CLOCK="#(printf '\uF017')"
ICON_ZOOM="#(printf '\uF0B2')"

# Uncomment to move statusbar to the top
set-option -g status-position top

# Basic colors of the Statusbar
set-option -g status-style bg=${BG},fg=${FG}

# Show the window list centered between the left and the right section
set-option -g status-justify centre

# Left: session pill (frost-cyan text + icon; turns yellow while the prefix key is held)
set-option -g status-left "\
#[fg=${LIGHT_GRAY},bg=default]${HALF_ROUND_OPEN}\
#[bg=${LIGHT_GRAY},fg=#{?client_prefix,${YELLOW},${CYAN}},bold] ${ICON_SESSION} #S \
#[fg=${LIGHT_GRAY},bg=default]${HALF_ROUND_CLOSE}\
"

# Right: host pill + clock pill
set-option -g status-right "\
#[fg=${LIGHT_GRAY},bg=default]${HALF_ROUND_OPEN}\
#[bg=${LIGHT_GRAY},fg=${BLUE}] ${ICON_HOST} #h \
#[fg=${LIGHT_GRAY},bg=default]${HALF_ROUND_CLOSE}\
#[bg=default] \
#[fg=${LIGHT_GRAY},bg=default]${HALF_ROUND_OPEN}\
#[bg=${LIGHT_GRAY},fg=${CYAN}] ${ICON_CLOCK} %H:%M \
#[fg=${LIGHT_GRAY},bg=default]${HALF_ROUND_CLOSE}\
"

# Set max length of left and right section
set-option -g status-left-length 100
set-option -g status-right-length 100

# Inactive windows - muted text, no pill
set-option -g window-status-format "#[fg=${MUTED}] #I #W "

# Active window - bright frost-cyan pill, dark bold text (mirrors the waybar active workspace)
set-option -g window-status-current-format "\
#[fg=${CYAN},bg=default]${HALF_ROUND_OPEN}\
#[bg=${CYAN},fg=${BLACK},bold] #I #W#{?window_zoomed_flag, ${ICON_ZOOM},} \
#[fg=${CYAN},bg=default]${HALF_ROUND_CLOSE}\
"

# No extra separator between window items
set-option -g window-status-separator ""

# Pane borders - frost-cyan active border to match the active-window accent
set -g pane-border-lines heavy
set -g pane-border-style "fg=${LIGHT_GRAY}"
set -g pane-active-border-style "fg=${CYAN}"
set -g pane-border-status top
set -g pane-border-format " #P "

# Dim inactive panes so the focused pane stands out (text only — adding a bg here
# makes tmux paint pane backgrounds, which kills ghostty's transparency).
set -g window-style "fg=#6c7a96"
set -g window-active-style "fg=${FG}"
