set -g prefix C-f
unbind C-b
bind C-f send-prefix

set -g base-index 1
setw -g pane-base-index 1
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind ` move-window -r


set -g mouse on
set -g allow-rename off

set-option -g history-limit 100000

set-option -g set-titles on
set-option -g set-titles-string "#{pane_title}"

bind c new-window -c "#{pane_current_path}"
bind V split-window -h -c "#{pane_current_path}"
bind H split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
unbind <
unbind >

# Cycle vertical split layout: 75|25 → 50|50 → 25|75 and back
# Logic lives in ~/.local/bin/tmux-cycle-layout because tmux expands #{format}
# strings before passing to run-shell, making complex inline scripts unreliable.
bind -r < run-shell "tmux-cycle-layout left"
bind -r > run-shell "tmux-cycle-layout right"


bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R


set-option -s escape-time 0
#
# Styling
##

# VS Code Dark Modern colorscheme
RED="#f44747"
GREEN="#4ec9b0"
YELLOW="#dcdcaa"
BLUE="#569cd6"
MAGENTA="#c586c0"
CYAN="#9cdcfe"
BLACK="#1f1f1f"
DARK_GRAY="#2d2d2d"
LIGHT_GRAY="#3e3e3e"
BG="#2d2d2d"
FG="#cccccc"

# Nerdfont characters
HALF_ROUND_OPEN="#(printf '\uE0B6')"
HALF_ROUND_CLOSE="#(printf '\uE0B4')"
TRIANGLE_OPEN="#(printf '\uE0B2')"
TRIANGLE_CLOSE="#(printf '\uE0B0')"

# Uncomment to move statusbar to the top
set-option -g status-position top

# Basic colors of the Statusbar
set-option -g status-style bg=${BG},fg=${FG}

# Show the window list centered between the left and the right section
set-option -g status-justify centre

# Style and set contents on the left section
set-option -g status-left "\
#[fg=${LIGHT_GRAY},bg=default]${HALF_ROUND_OPEN}\
#[bg=${LIGHT_GRAY},fg=${YELLOW}]#S \
#[fg=${LIGHT_GRAY},bg=default]${TRIANGLE_CLOSE}\
"

# Style and set contents on the right section
set-option -g status-right "\
#[fg=${LIGHT_GRAY},bg=default]${TRIANGLE_OPEN}\
#[bg=${LIGHT_GRAY},fg=${CYAN}] #h\
#[fg=${LIGHT_GRAY},bg=default]${HALF_ROUND_CLOSE}\
"

# Set max length of left and right section
set-option -g status-left-length 100
set-option -g status-right-length 100

# Style and set content for the inactive windows
set-option -g window-status-format "\
 \
#I\
#[fg=${MAGENTA}]:\
#[fg=default]#W\
 \
"

# Style and set content for the active windows
set-option -g window-status-current-format "\
#[fg=${LIGHT_GRAY},bg=default]${HALF_ROUND_OPEN}\
#[bg=${LIGHT_GRAY},fg=default]#I\
#[fg=${RED}]:\
#[fg=default]#W\
#[fg=${LIGHT_GRAY},bg=default]${HALF_ROUND_CLOSE}\
"

# Remove the separator between window list items, as we already have spacing
# "around" inactive items
set-option -g window-status-separator ""

# Pane borders
set -g pane-border-lines heavy
set -g pane-border-style fg=${DARK_GRAY}
set -g pane-active-border-style fg=${GREEN},bold
set -g pane-border-status top
set -g pane-border-format " #{pane_index} "
