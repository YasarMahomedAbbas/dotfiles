general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = ~/.config/hypr/wallpapers/darksouls.png
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgb(2e3440)
    inner_color = rgb(3b4252)
    font_color = rgb(eceff4)
    check_color = rgb(88c0d0)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(eceff4ff)
    font_size = 72
    font_family = JetBrains Mono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(eceff4cc)
    font_size = 20
    font_family = JetBrains Mono Nerd Font
    position = 0, 110
    halign = center
    valign = center
}
