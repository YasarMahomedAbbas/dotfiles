# Theme colors ($lock_bg0 $lock_bg1 $lock_fg0 $lock_accent) — from `theme-switch`
source = ~/.config/theme/hyprlock-colors.conf

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = ~/.config/hypr/wallpapers/darksouls.png
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = $lock_bg0
    inner_color = $lock_bg1
    font_color = $lock_fg0
    check_color = $lock_accent
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(eceff4ff)
    font_size = 72
    font_family = JetBrains Mono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(eceff4cc)
    font_size = 20
    font_family = JetBrains Mono Nerd Font
    position = 0, 110
    halign = center
    valign = center
}
