gui:
  showFileTree: false
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#88c0d0"
      - bold
    inactiveBorderColor:
      - "#616e88"
    searchingActiveBorderColor:
      - "#ebcb8b"
    optionsTextColor:
      - "#88c0d0"
    selectedLineBgColor:
      - "#4c566a"
    cherryPickedCommitBgColor:
      - "#434c5e"
    cherryPickedCommitFgColor:
      - "#88c0d0"
    markedBaseCommitBgColor:
      - "#434c5e"
    markedBaseCommitFgColor:
      - "#ebcb8b"
    unstagedChangesColor:
      - "#bf616a"
    defaultFgColor:
      - "#eceff4"
git:
  pagers:
    - pager: delta --side-by-side --dark --paging=never
customCommands:
  - key: "t"
    context: "worktrees"
    description: "Open tmux session for worktree"
    command: "wt-session {{.SelectedWorktree.Path}}"
    output: terminal
