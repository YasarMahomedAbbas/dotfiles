palette = 'nord'

# Nord powerline: muted dark (Polar Night) segment backgrounds with light text.
# The segment slots (orange/yellow/aqua/blue/bg3/bg1) are dark Nord shades; color_fg0
# is the light on-segment text. green/red/purple stay bright because they are the
# character-prompt foregrounds drawn on the terminal background.
[palettes.nord]
color_fg0 = '#eceff4'
color_bg1 = '#2e3440'
color_bg3 = '#2e3440'
color_blue = '#2e3440'
color_aqua = '#4c566a'
color_green = '#a3be8c'
color_orange = '#3b4252'
color_purple = '#b48ead'
color_red = '#bf616a'
color_yellow = '#434c5e'

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"

